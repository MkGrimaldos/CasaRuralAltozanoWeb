    <style>
        .galeria-grid {

            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .galeria-grid img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 8px;

        .galeria-grid img:hover {

    </style>
